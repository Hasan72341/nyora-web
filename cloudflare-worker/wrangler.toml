# Cloudflare Worker: Nyora Web CORS + image proxy.
# Serves /proxy?url=... (HTML fetches for the in-browser parsers) and
# /image?u=...&h=Name:Value (cover/page images, applying the source-site Referer
# + UA — see worker.js). Deployed at nyora-cors-proxy.<account>.workers.dev and
# referenced by core/parser-runtime.js DEFAULT_PROXY_URL.
#
# Deploy:  cd cloudflare-worker && npx wrangler@latest deploy
# (first time:  npx wrangler login)

name = "nyora-cors-proxy"
main = "worker.js"
compatibility_date = "2024-11-01"
workers_dev = true
