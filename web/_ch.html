<!doctype html><meta charset=utf8><pre id=o style="font:14px monospace;color:#0f0;background:#000;padding:16px;margin:0"></pre>
<script type="module">
import api from '/core/api.js';
const O=document.getElementById('o'); const out=(s)=>{O.textContent+=s+"\n";};
try {
  const d = await api.details('ASURASCANS_US', '/comics/nano-machine-89829cb7');
  out('title: '+(d.manga&&d.manga.title));
  out('chapters: '+((d.chapters||[]).length));
  out('first ch: '+JSON.stringify((d.chapters||[])[0]||null).slice(0,120));
  out((d.chapters||[]).length > 0 ? '✅ CHAPTERS LOADING' : '❌ still empty');
} catch(e){ out('ERROR: '+(e&&e.message||e)); }
</script>
