<!doctype html><meta charset=utf8><pre id=o style="font:13px monospace;color:#0f0;background:#000;padding:14px"></pre>
<script>
const O=document.getElementById('o'),log=s=>O.textContent+=s+"\n";
const errs=[]; window.addEventListener('error',e=>errs.push('ERR: '+(e.message||e)));
window.addEventListener('unhandledrejection',e=>errs.push('REJECT: '+(e.reason&&e.reason.message||e.reason)));
(async()=>{
  try{
    const r=await fetch('/index.html'); log('index.html: '+r.status);
    const api=await import('/core/api.js'); log('core/api.js imported: '+(api?'ok':'fail'));
    const ui=await import('/core/ui.js'); log('core/ui.js (langLabel/googleMark): '+(typeof ui.langLabel)+'/'+(typeof ui.googleMark));
    const pr=await import('/core/parser-runtime.js'); log('parser-runtime: ok');
    await new Promise(r=>setTimeout(r,1500));
    log(errs.length? '❌ errors:\n'+errs.slice(0,5).join('\n') : '✅ no module/runtime errors');
  }catch(e){ log('❌ IMPORT FAILED: '+(e.message||e)); }
})();
</script>
